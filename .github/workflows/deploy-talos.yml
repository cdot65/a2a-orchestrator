name: Deploy to Talos

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - ".dockerignore"
      - "k8s/**"
      - ".github/workflows/deploy-talos.yml"
  workflow_dispatch:

concurrency:
  group: a2a-talos-deploy
  cancel-in-progress: false

jobs:
  changes:
    runs-on: [self-hosted, talos]
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Dockerfile'
              - 'k8s/**'

  deploy-app:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, talos]
    env:
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Build and push image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --file Dockerfile \
            --build-arg BUILD_VERSION=${{ github.sha }} \
            --tag ghcr.io/cdot65/a2a-orchestrator:talos \
            --tag ghcr.io/cdot65/a2a-orchestrator:${{ github.sha }} \
            .

      - name: Install kubectl if missing
        run: |
          if ! command -v kubectl &>/dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/kubectl
          fi

      - name: Rollout restart deployments
        run: |
          kubectl rollout restart deployment/orchestrator -n a2a
          kubectl rollout restart deployment/recipe-url -n a2a
          kubectl rollout restart deployment/recipe-gen -n a2a

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/orchestrator -n a2a --timeout=300s
          kubectl rollout status deployment/recipe-url -n a2a --timeout=300s
          kubectl rollout status deployment/recipe-gen -n a2a --timeout=300s

      - name: Wait for pods ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=orchestrator -n a2a --timeout=300s
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=recipe-url -n a2a --timeout=300s
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=recipe-gen -n a2a --timeout=300s
