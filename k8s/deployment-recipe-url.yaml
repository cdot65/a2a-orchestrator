apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipe-url
  namespace: a2a
  labels:
    app.kubernetes.io/name: recipe-url
    app.kubernetes.io/part-of: a2a-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: recipe-url
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recipe-url
        app.kubernetes.io/part-of: a2a-orchestrator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
        - name: app
          image: ghcr.io/cdot65/a2a-orchestrator:talos
          imagePullPolicy: Always
          args: ["a2a_orchestrator.recipe_url"]
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: RECIPE_URL_PORT
              value: "8001"
            - name: CLAUDE_MODEL
              value: claude-haiku-4-5-20251001
            - name: LOG_FORMAT
              value: json
            - name: RECIPES_DIR
              value: /data/recipes
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic
                  key: ANTHROPIC_API_KEY
          volumeMounts:
            - name: recipes
              mountPath: /data/recipes
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: recipes
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: recipe-url
  namespace: a2a
spec:
  selector:
    app.kubernetes.io/name: recipe-url
  ports:
    - name: http
      port: 8001
      targetPort: http
