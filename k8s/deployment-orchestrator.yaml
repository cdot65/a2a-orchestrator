apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: a2a
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: a2a-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator
        app.kubernetes.io/part-of: a2a-orchestrator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: ghcr.io/cdot65/a2a-orchestrator:latest
          imagePullPolicy: IfNotPresent
          # CMD defaults to a2a_orchestrator.orchestrator — no args override needed
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: ORCHESTRATOR_PORT
              value: "8000"
            - name: CLAUDE_MODEL
              value: claude-haiku-4-5-20251001
            - name: LOG_FORMAT
              value: json
            # Shell agent excluded: relies on Docker container spawning which is
            # incompatible with k8s. K8s-native sandbox (Job API / gVisor) is
            # follow-up work. See k8s/README.md for details.
            - name: A2A_DISCOVERY_URLS
              value: "http://recipe-url.a2a.svc.cluster.local:8001,http://recipe-gen.a2a.svc.cluster.local:8002"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic
                  key: ANTHROPIC_API_KEY
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: a2a
spec:
  selector:
    app.kubernetes.io/name: orchestrator
  ports:
    - name: http
      port: 8000
      targetPort: http
